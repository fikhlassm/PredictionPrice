name: rumahku_predictor
description: Aplikasi prediksi harga rumah California menggunakan model DNN.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.1

  # Local storage untuk riwayat prediksi
  shared_preferences: ^2.2.3

  # Format mata uang & tanggal
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
